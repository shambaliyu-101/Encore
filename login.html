<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Encore Login</title>
<link href="https://fonts.googleapis.com/css2?family=Agbalumo&display=swap" rel="stylesheet">
<link rel="stylesheet" href="login.css">
</head>
<body>

<div class="card">

  <div class="toggle">
    <input type="radio" name="auth-tab" id="login-tab" checked>
    <input type="radio" name="auth-tab" id="signup-tab">
    <label for="login-tab">Login</label>
    <label for="signup-tab">Sign Up</label>
    <div class="toggle-slider"></div>
  </div>

  <div class="heading">
    <h1>Welcome Back</h1>
    <p>Sign in to discover events near you!</p>
  </div>

  <div class="field">
    <label class="field-label" for="email">Email</label>
    <input type="email" id="email" placeholder="you@example.com">
  </div>

  <div class="field">
    <label class="field-label" for="password">Password</label>
    <input type="password" id="password" placeholder="••••••••">
  </div>

  <div class="options">
    <label class="remember">
      <input type="checkbox" checked>
      Remember me
    </label>
    <a href="#" class="forgot">Forgot password?</a>
  </div>

  <button class="login-btn">Sign In</button>

</div>

</body>
</html>
